---
name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Create CI environment file
        run: |
          {
            echo 'APP_ENV=dev'
            echo 'APP_SECRET=ci_secret_for_tests_only'
            echo 'APP_SHARE_DIR=var/share'
            echo 'DEFAULT_URI=http://localhost'
            echo 'DATABASE_URL="mysql://app:!ChangeMe!@database:3306/app?serverVersion=8.0.32&charset=utf8mb4"'
            echo 'MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0'
            echo 'JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem'
            echo 'JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem'
            echo 'JWT_PASSPHRASE=ci_passphrase'
            echo 'STRIPE_SECRET_KEY=sk_test_ci'
            echo 'STRIPE_PUBLISHABLE_KEY=pk_test_ci'
            echo 'STRIPE_WEBHOOK_SECRET=whsec_ci'
            echo 'STRIPE_PRICE_ID=price_ci'
            echo 'ORS_API_KEY='
          } > .env

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, iconv, sodium, xml, sockets
          tools: composer
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-scripts
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          source: .
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max
      - name: Start services
        run: docker compose up --wait --no-build
      - name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost
      - name: Check Mercure reachability
        run: curl -vI --insecure --fail-with-body https://localhost/.well-known/mercure?topic=test
      - name: Show PHP container logs on failure
        if: failure()
        run: docker compose logs php

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, iconv, sodium, xml, sockets
          tools: composer
      - name: Create CI environment file
        run: |
          {
            echo 'APP_ENV=dev'
            echo 'APP_SECRET=ci_secret_for_quality_checks_only'
            echo 'APP_SHARE_DIR=var/share'
            echo 'DEFAULT_URI=http://localhost'
            echo 'DATABASE_URL="mysql://app:!ChangeMe!@127.0.0.1:3306/app?serverVersion=8.0&charset=utf8mb4"'
            echo 'MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0'
            echo 'JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem'
            echo 'JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem'
            echo 'JWT_PASSPHRASE=ci_passphrase'
            echo 'STRIPE_SECRET_KEY=sk_test_ci'
            echo 'STRIPE_PUBLISHABLE_KEY=pk_test_ci'
            echo 'STRIPE_WEBHOOK_SECRET=whsec_ci'
            echo 'STRIPE_PRICE_ID=price_ci'
            echo 'ORS_API_KEY='
          } > .env
      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:ci_passphrase -out config/jwt/private.pem 4096
          openssl rsa -passin pass:ci_passphrase -in config/jwt/private.pem -pubout -out config/jwt/public.pem
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts
      - name: Warmup Symfony cache
        run: php bin/console cache:warmup
      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes --format=txt
      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --error-format=github
      - name: Psalm
        run: vendor/bin/psalm --no-progress --output-format=github
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: TypeScript typecheck
        run: npm run typecheck
        working-directory: frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v7
        env:
          GITHUB_ACTIONS_CONFIG_FILE: actionlint.yaml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_CHECKOV: false
          VALIDATE_TRIVY: false
          # COPY --exclude requires hadolint >= 2.12 — super-linter bundles an older version
          VALIDATE_DOCKERFILE_HADOLINT: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          # PHP handled by dedicated quality job
          VALIDATE_PHP_BUILTIN: false
          VALIDATE_PHP_PHPCS: false
          VALIDATE_PHP_PHPSTAN: false
          VALIDATE_PHP_PSALM: false
          # Frontend: TypeScript handled by quality job — no ESLint/Prettier configured
          VALIDATE_CSS: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_JAVASCRIPT_STANDARD: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_VUE_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          # Too noisy / requires extra project-wide config files
          VALIDATE_JSCPD: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_EDITORCONFIG: false
          VALIDATE_ENV: false
          VALIDATE_MARKDOWN: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
