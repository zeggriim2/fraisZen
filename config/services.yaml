# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # CQRS buses — bind concrete Messenger implementations to interfaces
    App\SharedKernel\Application\Bus\CommandBusInterface:
        class: App\SharedKernel\Infrastructure\Bus\MessengerCommandBus
        arguments:
            $commandBus: '@command.bus'

    App\SharedKernel\Application\Bus\QueryBusInterface:
        class: App\SharedKernel\Infrastructure\Bus\MessengerQueryBus
        arguments:
            $queryBus: '@query.bus'

    # Repository implementations bound to domain interfaces
    App\Person\Domain\Repository\PersonRepositoryInterface:
        class: App\Person\Infrastructure\Persistence\DoctrinePersonRepository

    App\Expense\Domain\Repository\ExpenseRepositoryInterface:
        class: App\Expense\Infrastructure\Persistence\DoctrineExpenseRepository

    App\Auth\Domain\Repository\UserRepositoryInterface:
        class: App\Auth\Infrastructure\Persistence\DoctrineUserRepository

    App\Expense\Infrastructure\Http\ReceiptController:
        arguments:
            $shareDir: '%kernel.project_dir%/%env(APP_SHARE_DIR)%'

    Stripe\StripeClient:
        arguments:
            $config: '%env(STRIPE_SECRET_KEY)%'

    App\Billing\Infrastructure\Http\Billing\WebhookController:
        arguments:
            $webhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Billing\Infrastructure\Http\Billing\CheckoutController:
        arguments:
            $priceIdMonthly: '%env(STRIPE_PRICE_ID_MONTHLY)%'
            $priceIdYearly: '%env(STRIPE_PRICE_ID_YEARLY)%'

    # Admin stats provider (Stripe MRR/ARR)
    App\Admin\Application\Stats\AdminStatsProviderInterface:
        alias: App\Admin\Infrastructure\Stats\StripeAdminStatsProvider

    # Expense export services
    App\Expense\Application\Export\SummaryPdfExporterInterface:
        alias: App\Expense\Infrastructure\Export\DompdfSummaryPdfExporter

    App\Expense\Application\Export\SummaryCsvExporterInterface:
        alias: App\Expense\Infrastructure\Export\StreamedSummaryCsvExporter

    # Admin fiscal config repository
    App\Admin\Domain\Repository\FiscalConfigRepositoryInterface:
        class: App\Admin\Infrastructure\Persistence\DoctrineFiscalConfigRepository

    # Public holiday service — uses scoped HTTP client for calendrier.api.gouv.fr
    App\SharedKernel\Infrastructure\PublicHoliday\PublicHolidayService:
        arguments:
            $httpClient: '@datagouv.client'

    # Distance handler — uses scoped HTTP client for OpenRouteService
    App\Expense\Application\Query\GetDistance\GetDistanceQueryHandler:
        arguments:
            $httpClient: '@openrouteservice.client'

    # Tag command & query handlers to their respective buses
    _instanceof:
        App\SharedKernel\Application\Bus\CommandHandlerInterface:
            tags: [{ name: messenger.message_handler, bus: command.bus }]
        App\SharedKernel\Application\Bus\QueryHandlerInterface:
            tags: [{ name: messenger.message_handler, bus: query.bus }]
